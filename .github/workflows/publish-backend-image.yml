name: Build and Publish Backend Image to GHCR

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (optional, for multi-platform)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use a personal access token if provided in secrets.GHCR_PAT, otherwise fall back to GITHUB_TOKEN
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          build-args: |
            NODE_ENV=production

      - name: Image info
        run: |
          echo "Image pushed to GHCR: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest"

# Notes:
# - This workflow assumes the backend Dockerfile is at the repository root named `Dockerfile`.
# - It uses the automatically-provided `GITHUB_TOKEN` to authenticate with GHCR; you may use a personal access token stored
#   in `secrets.GHCR_PAT` if you prefer (set `username` and `password` accordingly).
# - Ensure the repo's package permissions allow `packages: write` for GITHUB_TOKEN (Organization settings may block it).
# - After the first push, you can pull the image with: `docker pull ghcr.io/<owner>/<repo>:latest`.
