# Render Blueprint — https://render.com/docs/blueprint-spec
# Coloque este arquivo na raiz do repositório api-node-prisma-avanti-bootcamp

services:
  - type: web
    name: api-bootcamp-backend
    runtime: node
    region: oregon          # escolha a região mais próxima de você
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false         # você preencherá no painel do Render
      - key: JWT_SECRET
        sync: false         # você preencherá no painel do Render
      - key: CORS_ORIGIN
        sync: false         # ex: https://opaulosaa.github.io
